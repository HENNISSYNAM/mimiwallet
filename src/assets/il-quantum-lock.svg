<svg viewBox="0 0 360 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qlBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF2FF"/>
      <stop offset="1" stop-color="#E7FBF1"/>
    </linearGradient>
    <linearGradient id="qlLock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#007AFF"/>
      <stop offset="1" stop-color="#0A63D6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="360" height="240" rx="28" fill="url(#qlBg)"/>
  <!-- lattice grid (quantum motif) -->
  <g stroke="#B9D4FF" stroke-width="1.5" opacity="0.7">
    <line x1="40" y1="40" x2="90" y2="70"/><line x1="90" y1="70" x2="60" y2="120"/>
    <line x1="60" y1="120" x2="110" y2="150"/><line x1="270" y1="50" x2="320" y2="90"/>
    <line x1="320" y1="90" x2="290" y2="140"/><line x1="290" y1="140" x2="320" y2="185"/>
  </g>
  <g fill="#7FB0FF">
    <circle cx="40" cy="40" r="4"/><circle cx="90" cy="70" r="4"/><circle cx="60" cy="120" r="4"/>
    <circle cx="110" cy="150" r="4"/><circle cx="270" cy="50" r="4"/><circle cx="320" cy="90" r="4"/>
    <circle cx="290" cy="140" r="4"/><circle cx="320" cy="185" r="4"/>
  </g>
  <!-- lock body -->
  <rect x="128" y="112" width="104" height="88" rx="20" fill="url(#qlLock)"/>
  <path d="M150 112 v-16 a30 30 0 0 1 60 0 v16" stroke="#0A63D6" stroke-width="14" fill="none" stroke-linecap="round"/>
  <circle cx="180" cy="150" r="13" fill="#fff"/>
  <rect x="176" y="150" width="8" height="26" rx="4" fill="#fff"/>
  <!-- shield check accent -->
  <g transform="translate(236 150)">
    <path d="M0 -14 l18 7 v10 c0 12 -9 19 -18 22 c-9 -3 -18 -10 -18 -22 v-10 z" fill="#34C759"/>
    <path d="M-7 1 l5 5 l10 -11" stroke="#fff" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
