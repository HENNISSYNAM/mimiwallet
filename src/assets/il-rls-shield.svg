<svg viewBox="0 0 360 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rsBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF2FF"/>
      <stop offset="1" stop-color="#F2ECFF"/>
    </linearGradient>
    <linearGradient id="rsShield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34C759"/>
      <stop offset="1" stop-color="#1FA648"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="360" height="240" rx="28" fill="url(#rsBg)"/>
  <!-- three isolated company cards -->
  <g font-family="-apple-system,Inter,sans-serif">
    <g transform="translate(28 150)">
      <rect x="0" y="0" width="70" height="60" rx="14" fill="#fff"/>
      <circle cx="35" cy="20" r="10" fill="#CFE0FF"/>
      <rect x="16" y="38" width="38" height="6" rx="3" fill="#E5E7EB"/>
      <rect x="22" y="48" width="26" height="6" rx="3" fill="#E5E7EB"/>
    </g>
    <g transform="translate(145 150)">
      <rect x="0" y="0" width="70" height="60" rx="14" fill="#fff"/>
      <circle cx="35" cy="20" r="10" fill="#BDEFD3"/>
      <rect x="16" y="38" width="38" height="6" rx="3" fill="#E5E7EB"/>
      <rect x="22" y="48" width="26" height="6" rx="3" fill="#E5E7EB"/>
    </g>
    <g transform="translate(262 150)">
      <rect x="0" y="0" width="70" height="60" rx="14" fill="#fff"/>
      <circle cx="35" cy="20" r="10" fill="#D9C7FF"/>
      <rect x="16" y="38" width="38" height="6" rx="3" fill="#E5E7EB"/>
      <rect x="22" y="48" width="26" height="6" rx="3" fill="#E5E7EB"/>
    </g>
  </g>
  <!-- dashed isolation walls -->
  <g stroke="#9CA3AF" stroke-width="2" stroke-dasharray="4 6" opacity="0.6">
    <line x1="122" y1="140" x2="122" y2="220"/>
    <line x1="239" y1="140" x2="239" y2="220"/>
  </g>
  <!-- central shield -->
  <g transform="translate(180 74)">
    <path d="M0 -40 l44 16 v26 c0 30 -22 46 -44 54 c-22 -8 -44 -24 -44 -54 v-26 z" fill="url(#rsShield)"/>
    <path d="M-16 4 l11 12 l24 -26" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="180" y="132" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-weight="700" font-size="13" fill="#1FA648">Row-Level Security</text>
</svg>
