<svg viewBox="0 0 360 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="msBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E7FBF1"/>
      <stop offset="1" stop-color="#EAF2FF"/>
    </linearGradient>
    <linearGradient id="msGauge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF9500"/>
      <stop offset="0.5" stop-color="#34C759"/>
      <stop offset="1" stop-color="#007AFF"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="360" height="240" rx="28" fill="url(#msBg)"/>
  <!-- data column -->
  <g transform="translate(34 80)">
    <rect x="0" y="0" width="58" height="80" rx="12" fill="#fff"/>
    <rect x="10" y="14" width="38" height="7" rx="3.5" fill="#CFE0FF"/>
    <rect x="10" y="30" width="30" height="7" rx="3.5" fill="#CFE0FF"/>
    <rect x="10" y="46" width="38" height="7" rx="3.5" fill="#BDEFD3"/>
    <rect x="10" y="62" width="24" height="7" rx="3.5" fill="#CFE0FF"/>
  </g>
  <text x="63" y="184" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-size="12" fill="#6B7280">Dữ liệu</text>
  <!-- arrow -->
  <path d="M104 120 h34" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
  <path d="M134 114 l8 6 l-8 6" stroke="#9CA3AF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- ML node (brain/chip) -->
