    <g stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round">
      <circle cx="26" cy="26" r="5" fill="#fff" stroke="none"/>
      <circle cx="48" cy="20" r="5" fill="#fff" stroke="none"/>
      <circle cx="46" cy="48" r="5" fill="#fff" stroke="none"/>
      <circle cx="24" cy="50" r="5" fill="#fff" stroke="none"/>
      <line x1="26" y1="26" x2="48" y2="20"/><line x1="48" y1="20" x2="46" y2="48"/>
      <line x1="46" y1="48" x2="24" y2="50"/><line x1="24" y1="50" x2="26" y2="26"/>
      <line x1="26" y1="26" x2="46" y2="48"/>
    </g>
  </g>
  <text x="186" y="184" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-size="12" fill="#6B7280">Mô hình ML</text>
  <!-- arrow -->
