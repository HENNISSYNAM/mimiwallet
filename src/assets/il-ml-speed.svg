  <path d="M264 114 l8 6 l-8 6" stroke="#9CA3AF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- score gauge -->
  <g transform="translate(282 84)">
    <path d="M6 60 A34 34 0 1 1 62 60" fill="none" stroke="#E5E7EB" stroke-width="9" stroke-linecap="round"/>
    <path d="M6 60 A34 34 0 0 1 60 22" fill="none" stroke="url(#msGauge)" stroke-width="9" stroke-linecap="round"/>
    <text x="34" y="52" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-weight="800" font-size="22" fill="#111">701</text>
  </g>
  <text x="316" y="184" text-anchor="middle" font-family="-apple-system,Inter,sans-serif" font-size="12" fill="#6B7280">Điểm số</text>
